<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jianghu Spar Arena</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0d0a;
        --panel: #1a1612;
        --panel-2: #241e18;
        --ink: #f4e9d6;
        --muted: #9a8a72;
        --accent: #d4a24c;
        --danger: #c8453a;
        --good: #6fae5e;
        --border: #3a2f24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 1.25rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 1.4rem;
        letter-spacing: 0.02em;
      }
      .pickers {
        display: flex;
        gap: 0.75rem;
        align-items: end;
        flex-wrap: wrap;
      }
      .pickers label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        font-size: 0.78rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        flex: 1;
        min-width: 180px;
      }
      select {
        appearance: none;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.55rem 0.7rem;
        font-size: 0.95rem;
      }
      .vs {
        color: var(--accent);
        font-weight: 700;
        padding-bottom: 0.55rem;
      }
      #spar-btn {
        margin: 1rem 0;
        background: var(--accent);
        color: #1a1208;
        border: none;
        border-radius: 8px;
        padding: 0.7rem 1.4rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      #spar-btn:disabled { opacity: 0.5; cursor: default; }
      #spar-btn:hover:not(:disabled) { filter: brightness(1.08); }

      .arena {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
        margin: 1rem 0;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        text-align: center;
        transition: box-shadow 0.4s, border-color 0.4s;
      }
      .card.winner {
        border-color: var(--good);
        box-shadow: 0 0 0 2px var(--good), 0 0 24px rgba(111, 174, 94, 0.35);
      }
      .card.loser { opacity: 0.62; }
      .emblem { font-size: 2.6rem; line-height: 1; }
      .card h3 { margin: 0.4rem 0 0.2rem; font-size: 1.05rem; }
      .card .sub { color: var(--muted); font-size: 0.78rem; }
      .threat-bar {
        height: 8px;
        background: var(--panel-2);
        border-radius: 4px;
        margin: 0.6rem 0 0.2rem;
        overflow: hidden;
      }
      .threat-bar > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--good), var(--accent), var(--danger));
        border-radius: 4px;
      }
      .card .phrase {
        font-style: italic;
        color: var(--ink);
        font-size: 0.85rem;
        margin-top: 0.4rem;
      }
      .center-vs {
        font-size: 1.3rem;
        color: var(--accent);
        font-weight: 800;
      }

      .rounds { margin: 0.5rem 0; }
      .round {
        background: var(--panel);
        border-left: 3px solid var(--accent);
        border-radius: 0 8px 8px 0;
        padding: 0.7rem 0.9rem;
        margin-bottom: 0.5rem;
        opacity: 0;
        transform: translateY(8px);
        animation: fadeIn 0.5s ease forwards;
      }
      .round .rlabel {
        color: var(--accent);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 700;
      }
      .round .rtext { font-size: 0.92rem; margin-top: 0.15rem; }
      @keyframes fadeIn {
        to { opacity: 1; transform: translateY(0); }
      }

      .verdict {
        background: var(--panel-2);
        border: 1px solid var(--accent);
        border-radius: 12px;
        padding: 1rem;
        text-align: center;
        margin: 1rem 0;
        opacity: 0;
        animation: fadeIn 0.5s ease 0.2s forwards;
      }
      .verdict.draw { border-color: var(--muted); }
      .verdict .winner-name { color: var(--good); font-weight: 800; }
      .verdict .vtext { color: var(--ink); margin-top: 0.3rem; font-size: 0.92rem; }

      .dossier {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        margin-top: 0.75rem;
        font-size: 0.88rem;
        white-space: pre-wrap;
        color: var(--ink);
      }
      .dossier h4 { margin: 0 0 0.4rem; color: var(--accent); }
      .dossier-btn {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.3rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      .dossier-btn:hover { color: var(--accent); border-color: var(--accent); }

      .status { color: var(--muted); font-size: 0.85rem; margin: 0.5rem 0; }
      .err { color: var(--danger); }
    </style>
  </head>
  <body>
    <div id="app">
      <header><h1>⚔️ Jianghu Spar Arena</h1></header>
      <div class="status" id="status">Connecting to the jianghu…</div>
      <section class="pickers" id="pickers" hidden>
        <label>Faction A<select id="faction-a"></select></label>
        <span class="vs">vs</span>
        <label>Faction B<select id="faction-b"></select></label>
      </section>
      <button id="spar-btn" hidden>Begin the Spar</button>
      <div id="arena"></div>
      <div id="dossier"></div>
    </div>
    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
